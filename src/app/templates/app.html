<!doctype html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" type="image/png" href="/static/logo.png">
  <title>IdentiFruit</title>
</head>

<body class="min-h-full bg-linear-to-b from-slate-900 via-gray-900 to-slate-950 flex items-center justify-center p-6">
  <div
    class="w-full max-w-4xl aspect-square rounded-4xl p-6 sm:p-8 bg-slate-800 shadow-neu-lg flex flex-col">

    <div class="mb-6 text-center">
      <h1 class="text-2xl sm:text-3xl font-semibold text-white">IdentiFruit</h1>
      <p class="mt-2 text-slate-400">Upload a fruit image and get a prediction.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
      <div class="grid grid-rows-2 gap-6">
        <label for="fileInput"
          class="h-full flex items-center justify-center rounded-3xl bg-slate-800 text-slate-400 font-semibold text-lg shadow-neu active:shadow-neu-pressed transition-all duration-200 cursor-pointer">
          Upload Image
        </label>

        <input id="fileInput" type="file" accept="image/*" class="hidden" />

        <button id="cameraBtn" type="button"
          class="h-full rounded-3xl bg-slate-800 text-slate-400 font-semibold text-lg shadow-neu active:shadow-neu-pressed transition-all duration-200">
          Take Picture
        </button>

        <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden" />

      </div>

      <div
        class="rounded-3xl bg-slate-900 shadow-neu-inset overflow-hidden min-h-[320px] relative">
        <div id="placeholderState"
          class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 z-10">
          <p class="text-slate-400 text-sm">Waiting for image upload or take a picture</p>
          <p class="text-slate-400 text-sm">Supported formats: JPG, PNG, WEBP, JFIF </p>
          <p id="fileName" class="mt-3 text-slate-400 text-xs">No image selected</p>
        </div>

        <img id="previewImage" src="" alt="Preview"
          class="hidden absolute inset-0 w-full h-full object-contain p-4 z-0" />
        <video id="cameraPreview" autoplay playsinline
          class="hidden absolute inset-0 w-full h-full object-contain p-4 z-0"></video>
      </div>
    </div>

    <div class="mt-6 flex w-full gap-6">
      <button id="resetBtn" type="button"
        class="flex-1 rounded-3xl px-6 py-4 font-semibold text-slate-400 bg-slate-800 shadow-neu active:shadow-neu-pressed transition-all duration-200">
        Reset
      </button>

      <button id="captureBtn" type="button"
        class="flex-1 rounded-3xl px-6 py-4 font-semibold text-slate-400 bg-slate-800 shadow-neu active:shadow-neu-pressed transition-all duration-200">
        Capture
      </button>

      <button id="predictBtn" type="button"
        class="flex-1 rounded-3xl px-6 py-4 font-semibold text-slate-400 bg-slate-800 shadow-neu active:shadow-neu-pressed transition-all duration-200">
        Predict
      </button>
    </div>

    <div id="resultPopup" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4">
      <div class="w-full max-w-md rounded-3xl bg-slate-800 p-6 shadow-2xl border border-slate-700">
        <div class="flex items-center justify-between">
          <h2 class="text-xl font-semibold text-white">Prediction Result</h2>
          <button id="closePopupBtn" type="button"
            class="rounded-3xl px-3 py-1 font-semibold text-slate-400 bg-slate-800 shadow-neu active:shadow-neu-pressed transition-all duration-200">
            x
          </button>
        </div>

        <div class="mt-6 space-y-4">
          <div class="rounded-2xl bg-slate-900 p-4">
            <p class="text-sm text-slate-400">Fruit</p>
            <p id="popupFruit" class="mt-1 text-lg font-semibold text-white">-</p>
          </div>

          <div class="rounded-2xl bg-slate-900 p-4">
            <p class="text-sm text-slate-400">Percentage</p>
            <p id="popupResult" class="mt-1 text-lg font-semibold text-white">-</p>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </div>
</body>

</html>
