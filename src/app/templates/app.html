<!doctype html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" type="image/png" href="/static/logo.png">
  <title>IdentiFruit</title>
</head>

<body class="min-h-full bg-linear-to-b from-[#0f172a] via-[#111827] to-[#020617] flex items-center justify-center p-6">
  <div
    class="w-full max-w-4xl aspect-square rounded-4xl p-6 sm:p-8 bg-[#1e293b] shadow-[0.875rem_0.875rem_1.4rem_0_rgba(0,0,0,0.6),-0.75rem_-0.75rem_1.4rem_0_rgba(255,255,255,0.06)] flex flex-col">

    <div class="mb-6 text-center">
      <h1 class="text-2xl sm:text-3xl font-semibold text-white">IdentiFruit</h1>
      <p class="mt-2 text-slate-400">Upload a fruit image and get a prediction.</p>
    </div>

    <!-- Top buttons -->
    <div class="mb-6 flex w-full gap-6">
      <label for="fileInput"
        class="flex-1 rounded-3xl px-6 py-4 text-center font-semibold text-slate-400 bg-[#1e293b] shadow-[0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)] active:shadow-[inset_0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),inset_-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)] cursor-pointer">
        Upload Image
      </label>

      <button id="cameraBtn" type="button"
        class="flex-1 rounded-3xl px-6 py-4 font-semibold text-slate-400 bg-[#1e293b] shadow-[0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)] active:shadow-[inset_0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),inset_-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)]">
        Take Picture
      </button>

      <input id="fileInput" type="file" accept="image/*" class="hidden" />
      <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden" />
    </div>

    <!-- Center preview -->
    <div
      class="flex-1 rounded-[28px] bg-[#0f172a] shadow-[inset_0.7rem_0.7rem_1rem_0_rgba(0,0,0,0.6),inset_-0.55rem_-0.55rem_1rem_0_rgba(255,255,255,0.06)] overflow-hidden relative flex items-center justify-center">

      <div id="placeholderState"
        class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 z-10">
        <p class="text-slate-400 text-sm">Upload an image or take a picture</p>
        <p class="text-slate-400 text-sm">of an apple, banana, orange, strawberry</p>
        <p class="text-slate-400 text-sm">Supported formats: JPG, PNG, WEBP, JFIF</p>
        <p id="fileName" class="mt-3 text-slate-400 text-xs">No image selected</p>
      </div>

      <img id="previewImage" src="" alt="Preview" class="hidden w-full h-full object-contain p-4" />

      <video id="cameraPreview" autoplay playsinline class="hidden w-full h-full object-contain p-4"></video>
    </div>

    <!-- Bottom buttons -->
    <div class="mt-6 flex w-full gap-6">
      <button id="resetBtn" type="button"
        class="flex-1 rounded-3xl px-6 py-4 font-semibold text-slate-400 bg-[#1e293b] shadow-[0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)] active:shadow-[inset_0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),inset_-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)]">
        Reset
      </button>

      <button id="captureBtn" type="button"
        class="flex-1 rounded-3xl px-6 py-4 font-semibold text-slate-400 bg-[#1e293b] shadow-[0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)]">
        Capture
      </button>

      <button id="predictBtn" type="button"
        class="flex-1 rounded-3xl px-6 py-4 font-semibold text-slate-400 bg-[#1e293b] shadow-[0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)] active:shadow-[inset_0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),inset_-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)]">
        Predict
      </button>
    </div>

    <div id="resultPopup" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 p-4">
      <div class="w-full max-w-md rounded-3xl bg-[#1e293b] p-6 shadow-2xl border border-slate-700">
        <div class="flex items-center justify-between">
          <h2 class="text-xl font-semibold text-white">Prediction Result</h2>
          <button id="closePopupBtn" type="button"
            class="rounded-3xl px-3 py-1 font-semibold text-slate-400 bg-[#1e293b] shadow-[0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)] active:shadow-[inset_0.65rem_0.65rem_1rem_0_rgba(0,0,0,0.6),inset_-0.5rem_-0.5rem_1rem_0_rgba(255,255,255,0.08)]">
            x
          </button>
        </div>

        <div class="mt-6 space-y-4">
          <div class="rounded-2xl bg-[#0f172a] p-4">
            <p class="text-sm text-slate-400">Fruit</p>
            <p id="popupFruit" class="mt-1 text-lg font-semibold text-white">-</p>
          </div>

          <div class="rounded-2xl bg-[#0f172a] p-4">
            <p class="text-sm text-slate-400">Result</p>
            <p id="popupResult" class="mt-1 text-lg font-semibold text-white">-</p>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </div>
</body>

</html>
